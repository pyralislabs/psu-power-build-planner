<!-- PSU Power Build Planner — widget entry page. This page is loaded as an iframe target. -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PSU Power Build Planner</title>
    <!--
      style-src 'self' 'unsafe-inline': The widget component code (app.ts) sets
      inline style attributes on some elements (e.g. max-width for quantity
      inputs, margin/font-size for section headings). Vite-emitted CSS (bundled
      into dist/widget/assets/styles.css) is served from 'self'. The 'unsafe-inline'
      token is required for the inline style attributes; it is not required by
      third-party code. A future refactor could migrate all inline styles to
      class-based CSS and then tighten this to style-src 'self', but the widget's
      host-page isolation posture (no auth, no storage, no telemetry) keeps the
      risk of inline-style abuse at negligible.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:; connect-src 'self'; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors *;"
    />
    <!--
      The `frame-ancestors` directive above is delivered via meta and is therefore ignored
      by browsers per CSP spec. It is kept for documentation purposes only; a real
      `frame-ancestors` policy requires HTTP response headers, which GitHub Pages does not
      provide. See bootstrap.md section 17 ("CI, npm Release, Pages, And Operations") and
      SECURITY.md for the embeddability trade-off. Switch to Cloudflare Pages (which
      supports custom headers) for an enforceable `frame-ancestors` policy.
    -->
    <meta name="referrer" content="no-referrer" />
    <meta
      name="description"
      content="Component-derived power, PSU, and electricity cost estimates. Open source, backend-free, zero-runtime-dependency."
    />
  </head>
  <body>
    <psu-power-build-planner
      data-profile="local-ai-inference"
      data-currency="USD"
      data-rate-per-kwh="0.16"
    ></psu-power-build-planner>
    <script type="module" src="./iframe.ts"></script>
  </body>
</html>
