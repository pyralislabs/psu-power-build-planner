name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a04a72bf1f013772efb02953a1f4c5d9a59d6c6d # v4.0.0
        with:
          version: 10.33.3

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Validate dataset
        run: pnpm validate:data

      - name: Test coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Runtime dependency check
        run: pnpm check:runtime-deps

      - name: Packed package smoke
        run: pnpm verify:pack

      - name: Dependency audit
        run: pnpm audit --prod --audit-level=high
        continue-on-error: true

  browser:
    name: Widget browser smoke
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a04a72bf1f013772efb02953a1f4c5d9a59d6c6d # v4.0.0
        with:
          version: 10.33.3

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm test:browser:install

      - name: Build widget
        run: pnpm build:widget

      - name: Run Playwright tests
        run: pnpm test:browser
