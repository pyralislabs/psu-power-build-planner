name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          version: 10.33.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Validate dataset
        run: pnpm validate:data

      - name: Build package for tests
        run: pnpm build:package

      - name: Test coverage
        run: pnpm test:coverage

      - name: Build
        run: pnpm build

      - name: Runtime dependency check
        run: pnpm check:runtime-deps

      - name: Packed package smoke
        run: pnpm verify:pack

      - name: Dependency audit
        # Audit both runtime and dev dependencies. The package has zero runtime
        # dependencies but vulnerable dev tools (Vitest, Vite, esbuild, js-yaml)
        # must be gated here. See todo/security-scan.md INFRA-002.
        run: pnpm audit --audit-level=high
        # SECURITY_OVERRIDE.md (if present and unexpired) may keep this
        # non-blocking for a documented CVE with no fix available.
        continue-on-error: true

  browser:
    name: Widget browser smoke
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          version: 10.33.3

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm test:browser:install

      - name: Build widget
        run: pnpm build:widget

      - name: Run Playwright tests
        run: pnpm test:browser
