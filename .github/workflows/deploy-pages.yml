name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build widget
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a04a72bf1f013772efb02953a1f4c5d9a59d6c6d # v4.0.0
        with:
          version: 10.33.3

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: "22"
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build widget
        run: pnpm build:widget

      - name: Add noindex marker
        run: |
          cat > dist/widget/_headers <<'EOF'
          X-Robots-Tag: all
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc60974a8cf6312a9b7b6e0e5d2a4c6b5c70d # v3.0.1
        with:
          path: ./dist/widget

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6cd7392c55667d3a6c6d2c9b8c2b9b9b1d3b7a5 # v4.0.5
