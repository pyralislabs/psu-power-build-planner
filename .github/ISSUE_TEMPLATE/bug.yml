name: Bug report

description: Report a defect in the calculation, CLI, widget, or dataset.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: |
        Provide a planner JSON file, CLI command, or widget URL. Do not include
        secrets or private data.
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Library (programmatic)
        - CLI
        - Widget
        - Dataset
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `npx psu-power-build-planner --version` or `psu-build-plan --version`.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Node version, OS, browser, dataset record IDs involved, etc.
    validations:
      required: false
